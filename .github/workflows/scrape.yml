name: Scrape ML Diario

on:
  schedule:
    - cron: '0 14 * * *'   # 8am Ciudad de México (UTC-6 CDT)
  workflow_dispatch:        # También ejecutable manualmente desde GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr pipeline
        run: python run_scrape.py --min-discount 20 --max-results 50 --min-score 0.1

      - name: Commit output + historial
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ historial.json 2>/dev/null || true
          git diff --staged --quiet && echo "Sin cambios" || \
            git commit -m "scrape: $(date -u +%Y-%m-%d) — $(python -c "import json,os; f=sorted([x for x in os.listdir('output') if x.endswith('.json')],reverse=True); d=json.load(open('output/'+f[0])) if f else {}; print(str(d.get('total',0))+' ofertas')" 2>/dev/null || echo 'OK')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
